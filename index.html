<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iraq Quantum Lab | مختبر الحوسبة الكمية</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root {
            --bg: #03060F; --cyan: #00F5E9; --blue: #1557FF; --gold: #F0B429;
            --text: rgba(210,230,255,.85); --border: rgba(0,245,233,.12);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Tajawal', sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        /* AUTH PAGE */
        #auth-page { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; background: var(--bg); }
        .auth-card { background: rgba(15, 98, 254, 0.05); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 400px; text-align: center; }
        .auth-card h1 { color: var(--gold); margin-bottom: 20px; }
        .field input { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; color: #fff; margin-bottom: 15px; border-radius: 8px; text-align: center; }
        
        /* LAB TERMINAL */
        #lab-ui { display: none; padding: 40px; max-width: 1000px; margin: auto; animation: fadeIn 0.8s ease; }
        .terminal { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 15px; padding: 30px; min-height: 400px; font-family: 'IBM Plex Mono', monospace; }
        .output-text { color: var(--cyan); line-height: 1.6; white-space: pre-wrap; margin-bottom: 20px; }
        
        .input-wrap { display: flex; gap: 10px; margin-top: 20px; }
        input#cmd { flex: 1; background: transparent; border: 1px solid var(--cyan); color: #fff; padding: 15px; border-radius: 8px; }
        button.exec { background: var(--blue); color: #fff; border: none; padding: 0 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .downloads { display: none; gap: 10px; margin-top: 20px; justify-content: center; }
        .btn-dl { padding: 10px 20px; border-radius: 6px; cursor: pointer; border: 1px solid var(--cyan); background: transparent; color: var(--cyan); font-weight: 700; transition: 0.3s; }
        .btn-dl:hover { background: var(--cyan); color: #000; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- صفحة الدخول -->
    <div id="auth-page">
        <div class="auth-card">
            <h1>IRAQ QUANTUM</h1>
            <p>وحدة أبحاث الأمن السيبراني</p>
            <div class="field"><input type="email" id="email" placeholder="البريد الإلكتروني"></div>
            <button class="exec" style="height: 50px; width: 100%;" onclick="startLab()">دخول للمختبر</button>
        </div>
    </div>

    <!-- واجهة المختبر -->
    <div id="lab-ui">
        <h2 style="color: var(--cyan); border-bottom: 1px solid var(--border); padding-bottom: 10px;">IQ-1 OSPREY TERMINAL</h2>
        <div class="terminal">
            <div id="output" class="output-text">> بانتظار الأوامر الكمية...</div>
            <div class="input-wrap">
                <input type="text" id="cmd" placeholder="أدخل الأمر (Shor 51)...">
                <button class="exec" onclick="runTask()">EXECUTE</button>
            </div>
        </div>
        <div class="downloads" id="dl-section">
            <button class="btn-dl" onclick="dlExcel()">📊 تنزيل EXCEL</button>
            <button class="btn-dl" onclick="dlPDF()">📄 تنزيل PDF رسمي</button>
        </div>
        <p style="text-align: center; font-size: 0.8rem; margin-top: 30px; opacity: 0.5;">TheHolyAmstrdam | Independent Research | © 2026</p>
    </div>

    <script>
        let resultData = null;

        function startLab() {
            if(!document.getElementById('email').value) return alert("يرجى إدخال الإيميل");
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('lab-ui').style.display = 'block';
        }

        async function runTask() {
            const query = document.getElementById('cmd').value;
            const output = document.getElementById('output');
            output.innerText = "> جاري المعالجة في مصفوفة الـ 51 كيوبت...";

            const res = await fetch('/api/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ query })
            });
            resultData = await res.json();
            output.innerText = resultData.answer;
            document.getElementById('dl-section').style.display = 'flex';
        }

        function dlExcel() {
            const ws = XLSX.utils.json_to_sheet(resultData.rawData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "IQ_Data");
            XLSX.writeFile(wb, `Iraq_Quantum_Analysis.xlsx`);
        }

        function dlPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFont("courier", "bold");
            doc.text("IRAQ QUANTUM LAB - OFFICIAL SCIENTIFIC REPORT", 105, 20, {align: "center"});
            doc.setFontSize(10);
            doc.text(resultData.answer, 20, 50);
            doc.save("IQ_Report.pdf");
        }
    </script>
</body>
</html>
